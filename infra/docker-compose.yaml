services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: app
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://root:password@postgres:5432/mydatabase
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ../:/usr/src/app
    networks:
      - backend

  redis:
    image: redis/redis-stack-server:7.2.0-v10
    container_name: redis
    restart: always
    ports:
      - '6380:6379'
    networks:
      - backend

  postgres:
    image: postgres:16.2
    container_name: postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: always
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  backend:
    driver: bridge
